<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para ti 🎀🌸</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            /* 1. AQUÍ VA LA URL DE TU IMAGEN DE FONDO (El campo con Kitty) */
            background-image: url('https://i.postimg.cc/5Nb6khnh/22dc0d47152a1220f871213179d9ccb1.jpg');
            background-size: cover;
            background-position: center bottom;
            background-repeat: no-repeat;
            
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden; 
            touch-action: none;
            position: relative;
        }

        .encabezado {
            position: absolute;
            top: 5%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(4px);
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: opacity 1s ease;
            z-index: 10;
            color: #7b1fa2;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .subtitulo {
            font-size: 1rem;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .instruccion {
            font-size: 1rem;
            font-weight: bold;
            color: #d81b60;
        }

        .campo-jardin {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 55%; 
            z-index: 5;
        }

        /* Actualizamos la clase para usar las imágenes de acuarela */
        .flor-dinamica {
            position: absolute;
            width: 75px; /* Tamaño ajustable según prefieras */
            height: 75px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            /* Añadimos un pequeño efecto de entrada suave */
            animation: aparecerFlor 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            filter: drop-shadow(0px 5px 5px rgba(0,0,0,0.2));
            object-fit: contain;
        }

        @keyframes aparecerFlor {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        /* --- Pantalla Sorpresa Final --- */
        .contenedor-sorpresa {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding-top: 10vh; 
            opacity: 0; 
            pointer-events: none; 
            transition: opacity 1.5s ease; 
            z-index: 20;
            
            /* PEGA EL ENLACE DE TU FONDO AQUÍ ABAJO */
            background-image: url('https://i.postimg.cc/0jzjZRY5/paslte.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .contenedor-sorpresa.visible {
            opacity: 1;
            pointer-events: auto;
        }

        /* Estilo del ramo inicial (invisible) */
        .ramo-sorpresa {
            max-width: 60%; 
            height: auto;
            margin-bottom: 20px;
            opacity: 0; 
            transform: translateY(20px) scale(0.9);
            transition: all 1s ease 0.5s; 
        }

        /* ESTA ES LA REGLA QUE FALTABA: Hace que el ramo aparezca */
        .contenedor-sorpresa.visible .ramo-sorpresa {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* Estilo del texto */
        .mensaje-final {
            font-size: 1.6rem; 
            color: #d81b60;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            animation: latido 2s infinite;
            padding: 0 20px;
            line-height: 1.3;
        }

        @keyframes latido {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <header class="encabezado" id="encabezado">
        <h1>Toma Kiara 🎀</h1>
        <p class="subtitulo">Un detalle virtual, pensado para ti.</p>
        <div class="instruccion" id="contador-texto">Toca el césped 15 veces (0/15)</div>
    </header>

    <main class="campo-jardin" id="campo-jardin"></main>

    <div class="contenedor-sorpresa" id="sorpresa">
        <img src="https://i.postimg.cc/pTgnnLjZ/ramos.png" alt="Ramo de flores" class="ramo-sorpresa">
        <h2 class="mensaje-final">Cuando te sientas sola<br>y no sepas a donde ir,<br> yo estare aqui cada vez que necesites hablar con alguien. 🌸</h2>
    </div>

    <script>
    // 1. Definición de objetos de Audio (sin intentar reproducirlos aún)
    const musicaFondo = new Audio('https://files.catbox.moe/oeow50.mp3');
    musicaFondo.loop = true;

    const sonidoRamo = new Audio('https://files.catbox.moe/9ht0dh.mp3');
    sonidoRamo.loop = true;

    // 2. Variables del juego
    const urlsFlores = [
        'https://i.postimg.cc/vTLLwWRD/f1.png', 
        'https://i.postimg.cc/cCMMGQqC/f2.png', 
        'https://i.postimg.cc/8cBBgh8p/f3.png'  
    ];
    const posicionesPredefinidas = [
        { x: 6,  y: 12 }, { x: 24, y: 20 }, { x: 14, y: 34 }, { x: 32, y: 45 }, { x: 9,  y: 58 },
        { x: 32, y: 64 }, { x: 11, y: 82 }, { x: 28, y: 76 }, { x: 50, y: 86 }, { x: 84, y: 30 },
        { x: 72, y: 42 }, { x: 88, y: 55 }, { x: 70, y: 60 }, { x: 78, y: 73 }, { x: 76, y: 86 }
    ];

    let floresPlantadas = 0;
    const metaFlores = 15; 
    let juegoTerminado = false;
    let audioIniciado = false; // Bandera para saber si ya arrancamos los audios

    const encabezado = document.getElementById('encabezado');
    const contadorTexto = document.getElementById('contador-texto');
    const sorpresa = document.getElementById('sorpresa');
    const campo = document.getElementById('campo-jardin');

    campo.addEventListener('pointerdown', function() {
        if (juegoTerminado) return;

        // Si es el primer clic, arrancamos el audio
        if (!audioIniciado) {
            musicaFondo.play();
            sonidoRamo.play();
            audioIniciado = true;
        }

        // Sonido de clic al plantar
        const sonidoFlor = new Audio('https://files.catbox.moe/wnkvt9.mp3'); 
        sonidoFlor.play();

        // Lógica de plantar flores
        const posicion = posicionesPredefinidas[floresPlantadas];
        const urlFlorActual = urlsFlores[floresPlantadas % urlsFlores.length];
        const nuevaFlor = document.createElement('img');
        nuevaFlor.src = urlFlorActual;
        nuevaFlor.className = 'flor-dinamica';
        nuevaFlor.style.left = posicion.x + '%';
        nuevaFlor.style.top = posicion.y + '%';
        campo.appendChild(nuevaFlor);

        floresPlantadas++;
        contadorTexto.innerText = `Toca el césped ${metaFlores} veces (${floresPlantadas}/${metaFlores})`;

        if (floresPlantadas >= metaFlores) {
            juegoTerminado = true;
            musicaFondo.pause(); // Solo se pausa la música de fondo
            encabezado.style.opacity = '0';
            
            setTimeout(() => {
                sorpresa.classList.add('visible');
                setTimeout(() => { campo.style.display = 'none'; }, 1500);
            }, 1000); 
        }
    });
</script>
</body>
</html>
